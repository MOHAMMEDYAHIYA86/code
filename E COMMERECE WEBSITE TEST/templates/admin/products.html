{% extends "base.html" %}

{% block content %}
<h2>Manage Products</h2>
<form method="post" class="form-section">
    <h3>Add New Product</h3>
    <label>Name</label>
    <input name="name" required>
    
    <label>Slug</label>
    <input name="slug" required>
    
    <label>Description</label>
    <textarea name="description" required></textarea>
    
    <label>Price</label>
    <input name="price" type="number" step="0.01" required>
    
    <label>Inventory</label>
    <input name="inventory" type="number" required>
    
    <label>Category</label>
    <select name="category_id">
        <option value="">None</option>
        {% for cat in categories %}
            <option value="{{ cat.id }}">{{ cat.name }}</option>
        {% endfor %}
    </select>
    
    <button class="button" type="submit">Add Product</button>
</form>

<h3>Products List</h3>
<table class="products-table">
    <thead>
        <tr>
            <th>Name</th>
            <th>Price</th>
            <th>Inventory</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for product in products %}
            <tr>
                <td>{{ product.name }}</td>
                <td>${{ "%.2f" | format(product.price) }}</td>
                <td>{{ product.inventory }}</td>
                <td>
                    <a href="{{ url_for('admin_edit_product', product_id=product.id) }}" class="button small">Edit</a>
                    <form action="{{ url_for('admin_delete_product', product_id=product.id) }}" method="post" style="display:inline;">
                        <button class="button small" type="submit" onclick="return confirm('Delete?')">Delete</button>
                    </form>
                </td>
            </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
