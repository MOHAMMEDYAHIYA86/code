{% extends "base.html" %}

{% block content %}
<h2>Edit Product</h2>
<form method="post" class="form-section">
    <label>Name</label>
    <input name="name" value="{{ product.name }}" required>
    
    <label>Slug</label>
    <input name="slug" value="{{ product.slug }}" required>
    
    <label>Description</label>
    <textarea name="description" required>{{ product.description }}</textarea>
    
    <label>Price</label>
    <input name="price" type="number" step="0.01" value="{{ product.price }}" required>
    
    <label>Inventory</label>
    <input name="inventory" type="number" value="{{ product.inventory }}" required>
    
    <label>Category</label>
    <select name="category_id">
        <option value="">None</option>
        {% for cat in categories %}
            <option value="{{ cat.id }}" {% if product.category_id == cat.id %}selected{% endif %}>{{ cat.name }}</option>
        {% endfor %}
    </select>
    
    <button class="button" type="submit">Update Product</button>
</form>
<a href="{{ url_for('admin_products') }}" class="button">Back</a>
{% endblock %}
