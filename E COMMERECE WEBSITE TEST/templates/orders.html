{% extends "base.html" %}

{% block content %}
<h2>My Orders</h2>
<table class="orders-table">
    <thead>
        <tr>
            <th>Order ID</th>
            <th>Total</th>
            <th>Status</th>
            <th>Date</th>
            <th>Details</th>
        </tr>
    </thead>
    <tbody>
        {% for order in orders %}
            <tr>
                <td>{{ order.id }}</td>
                <td>${{ "%.2f" | format(order.total_amount) }}</td>
                <td>{{ order.status }}</td>
                <td>{{ order.created_at.strftime('%Y-%m-%d') }}</td>
                <td><a href="{{ url_for('order_detail', order_id=order.id) }}" class="button small">View</a></td>
            </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
