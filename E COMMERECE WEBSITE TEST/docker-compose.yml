version: '3.8'

services:
  web:
    build: .
    container_name: amoodi-web
    ports:
      - "8000:8000"
    environment:
      FLASK_ENV: production
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY}
      DATABASE_URL: postgresql://amoodi_user:secure_password@db:5432/amoodi_db
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./templates:/app/templates
      - ./static:/app/static
    networks:
      - amoodi-network
    restart: unless-stopped

  db:
    image: postgres:13-alpine
    container_name: amoodi-db
    environment:
      POSTGRES_DB: amoodi_db
      POSTGRES_USER: amoodi_user
      POSTGRES_PASSWORD: secure_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - amoodi-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U amoodi_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: amoodi-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./static:/app/static:ro
      - ./certificates:/etc/nginx/certs:ro
    depends_on:
      - web
    networks:
      - amoodi-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  amoodi-network:
    driver: bridge
